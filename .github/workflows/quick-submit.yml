name: AgentBeats Quick Submit
on:
  workflow_dispatch:
    inputs:
      agentbeats_payload:
        description: 'AgentBeats payload'
        required: true
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run AgentBeats
        uses: agentbeats/agentbeats-action@main
        with:
          payload: ${{ inputs.agentbeats_payload }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
