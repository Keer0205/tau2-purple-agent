name: Quick Submit
on:
  workflow_dispatch:
    inputs:
      agentbeats_payload:
        description: 'AgentBeats payload'
        required: true
        type: string
jobs:
  quick-submit:
    uses: agentbeats/agentbeats/.github/workflows/quick-submit.yml@main
    with:
      agentbeats_payload: ${{ inputs.agentbeats_payload }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
